url: https://dereckscompany.github.io/autotool/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/dereckscompany/autotool
      aria-label: GitHub repository

reference:
  - title: Tool definitions
    desc: >
      Build an LLM tool definition from any R function by introspecting
      its signature and documentation.
    contents:
      - generate_tool

  - title: Runtime dispatch
    desc: >
      Build a handler closure that merges hidden defaults with the
      model's supplied arguments and invokes the function.
    contents:
      - make_handler
